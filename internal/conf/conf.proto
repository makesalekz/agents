syntax = "proto3";
package kratos.api;

option go_package = "github.com/makesalekz/agents/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  string db = 2;
  Discovery discovery = 3;
}

message Discovery {
  string stores_endpoint = 1;
}

message Server {
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  GRPC grpc = 1;
}
